<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="max-width:600px;margin:0 auto;padding:40px 20px;">
    <!-- Header -->
    <div style="text-align:center;padding:32px 0;">
      <img src="https://tajnabotanika.online/logo_botanika.png" alt="Tajna Botanika" style="height:48px;width:auto;" />
    </div>

    <!-- Card -->
    <div style="background:linear-gradient(135deg,#0d1f17 0%,#0a1510 100%);border:1px solid #10b981;border-radius:16px;padding:40px 32px;text-align:center;">
      <!-- Icon -->
      <div style="display:inline-block;width:56px;height:56px;background:rgba(16,185,129,0.15);border-radius:50%;line-height:56px;margin-bottom:24px;">
        <span style="font-size:28px;">&#128274;</span>
      </div>

      <h1 style="color:#ffffff;font-size:24px;font-weight:700;margin:0 0 8px 0;">
        Reset hesla
      </h1>
      <p style="color:#9ca3af;font-size:15px;margin:0 0 32px 0;line-height:1.5;">
        Obdrzeli jsme zadost o zmenu hesla k vasemu uctu na Tajna Botanika.
      </p>

      <!-- CTA Button -->
      <a href="{{ .ConfirmationURL }}"
         style="display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#059669,#0d9488);color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;border-radius:12px;margin-bottom:24px;">
        Nastavit nove heslo
      </a>

      <p style="color:#6b7280;font-size:13px;margin:24px 0 0 0;line-height:1.5;">
        Odkaz je platny 1 hodinu. Pokud jste o reset nezadali, tento email muzete ignorovat.
      </p>
    </div>

    <!-- Footer -->
    <div style="text-align:center;padding:32px 0 0 0;">
      <p style="color:#4b5563;font-size:12px;margin:0 0 8px 0;">
        Tajna Botanika &mdash; Premiove botanicke produkty
      </p>
      <p style="color:#374151;font-size:11px;margin:0;">
        tajnabotanika.online
      </p>
    </div>
  </div>
</body>
</html>
